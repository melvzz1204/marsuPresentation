                    </div>
                    <div class="card" data-index="6">
                        <img src="/carousell/7.png" alt="Team Member 7">
                    </div>
                    <div class="card" data-index="7">
                        <img src="/carousell/8.png" alt="Team Member 8">
                    </div>
                    <div class="card" data-index="8">
                        <img src="/carousell/9.png" alt="Team Member 9">
                    </div>
                    <div class="card" data-index="9">

                    </div>
                    <div class="card" data-index="10">
                        <img src="/carousell/11.png" alt="Team Member 11">
                    </div>
                    <div class="card" data-index="11">
                        <img src="/carousell/12.png" alt="Team Member 12">
                    </div>
                </div>

        </div>

        <div class="controls-section">

            <div class="member-info">
                <h2 class="member-name">Emily Kim</h2>
                <p class="member-role">Founder</p>
            </div>

            <div class="dots">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
                <div class="dot" data-index="3"></div>
                <div class="dot" data-index="4"></div>
                <div class="dot" data-index="5"></div>
