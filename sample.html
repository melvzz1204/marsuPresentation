<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARSU</title>
    <link rel="stylesheet" href="./src/sample.css">
</head>

<body>
    <div class="main-container">
        <div class="carousel-section">
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="card" data-index="0">
                        <img src="/carousell/1.png" alt="Team Member 1">
                    </div>
                    <div class="card" data-index="1">
                        <img src="/carousell/2.png" alt="Team Member 2">
                    </div>
                    <div class="card" data-index="2">
                        <img src="/carousell/3.png" alt="Team Member 3">
                    </div>
                    <div class="card" data-index="3">
                        <img src="/carousell/4.png" alt="Team Member 4">
                    </div>
                    <div class="card" data-index="4">
                        <img src="/carousell/5.png" alt="Team Member 5">
                    </div>
                    <div class="card" data-index="5">
                        <img src="/carousell/6.png" alt="Team Member 6">
                    </div>
                    <div class="card" data-index="6">
                        <img src="/carousell/7.png" alt="Team Member 7">
                    </div>
                    <div class="card" data-index="7">
                        <img src="/carousell/8.png" alt="Team Member 8">
                    </div>
                    <div class="card" data-index="8">
                        <img src="/carousell/9.png" alt="Team Member 9">
                    </div>
                    <div class="card" data-index="9">
                        <img src="/carousell/10.png" alt="Team Member 10">
                    </div>
                    <div class="card" data-index="10">
                        <img src="/carousell/11.png" alt="Team Member 11">
                    </div>
                    <div class="card" data-index="11">
                        <img src="/carousell/12.png" alt="Team Member 12">
                    </div>
                </div>

            </div>
        </div>

        <div class="controls-section">

            <div class="dots">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
                <div class="dot" data-index="3"></div>
                <div class="dot" data-index="4"></div>
                <div class="dot" data-index="5"></div>
                <div class="dot" data-index="6"></div>
                <div class="dot" data-index="7"></div>
                <div class="dot" data-index="8"></div>
                <div class="dot" data-index="9"></div>
                <div class="dot" data-index="10"></div>
                <div class="dot" data-index="11"></div>
            </div>
        </div>
    </div>
    <script type="module" src="./src/js/sample.js"></script>
</body>

</html>
