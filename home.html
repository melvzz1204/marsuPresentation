<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarSU | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!--  <img src="./src/assets/Empower.png" alt="MarSU Empower" class="empower-img"> -->
    <div class="brand-container">
        <img src="./src/assets/marsuLogo.png" alt="MarSU Logo" class="logo">
        <h2>Empowering Minds, Transforming Lives, and Advancing Opportunities with a Heart!</h2>
    </div>

    <div class="loading-wrapper">
        <div class="loading-text">Loading<span>.</span><span>.</span><span>.</span></div>
    </div>

    <div class="project-title-container">

        <h2>Presidential Dashboard for Organizational Data and Insights</h2>
    </div>

    <div class="transition-curtain"></div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #660033;
            /* Burgundy Brand Color */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            font-family: "Montserrat", sans-serif;
        }

        /* --- STAGE 1: EMPOWER IMAGE (0.0s - 2.5s) --- */
        /*
        .empower-img {
            position: absolute;
            max-width: 80%;
            max-height: 70vh;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.95);
            animation: showcaseEmpower 2.5s ease-in-out forwards;
        }

        @keyframes showcaseEmpower {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            15% {
                opacity: 1;
                transform: scale(1);
            }

            85% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.02);
                visibility: hidden;
            }
        } */

        /* --- STAGE 2: BRAND CONTAINER (2.5s - 5.0s) --- */
        .brand-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 25px;
            max-width: 850px;
            padding: 20px;
            opacity: 0;
            transform: translateY(15px);
            animation: showcaseBrand 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 2.5s;
        }

        .logo {
            background-color: white;
            border-radius: 12px;
            width: 250px;
            height: 250px;
            object-fit: contain;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-family: "Oswald", sans-serif;
            color: #FFD700;
            /* Gold */
            font-size: 2.2rem;
            /* Oswald looks great slightly larger */
            font-weight: 500;
            text-transform: uppercase;
            line-height: 1.3;
            letter-spacing: 0.03em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
        }

        @keyframes showcaseBrand {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }

            15% {
                opacity: 1;
                transform: translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-15px);
                visibility: hidden;
            }
        }

        /* --- STAGE 3: SEPARATED LOADING ELEMENT (5.0s - 7.0s) --- */
        .loading-wrapper {
            position: absolute;
            opacity: 0;
            animation: showcaseLoader 2.0s ease-in-out forwards;
            animation-delay: 5.0s;
        }

        .loading-text {
            color: #FFD700;
            font-size: 2rem;
            text-transform: uppercase;

            font-weight: 400;
            opacity: 0.85;
        }

        .loading-text span {
            animation: pulseDots 1.4s infinite both;
            display: inline-block;
        }

        .loading-text span:nth-child(1) {
            animation-delay: 0.2s;
        }

        .loading-text span:nth-child(2) {
            animation-delay: 0.4s;
        }

        .loading-text span:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes showcaseLoader {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }

            15% {
                opacity: 1;
                transform: scale(1);
            }

            80% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.05);
                visibility: hidden;
            }
        }

        @keyframes pulseDots {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
                color: #FFD700;
            }

            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
        }

        /* --- STAGE 4: CINEMATIC PROJECT TITLE (7.0s - 9.8s) --- */
        .project-title-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 15px;
            max-width: 900px;
            padding: 20px;
            opacity: 0;
            transform: scale(0.98);
            animation: showcaseProject 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            animation-delay: 7.0s;
        }

        .project-title-container h1 {
            font-family: "Oswald", sans-serif;
            color: #FFD700;
            /* Gold */
            font-size: 4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .project-title-container h3 {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            opacity: 0.85;
            text-transform: uppercase;
            line-height: 1.5;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        @keyframes showcaseProject {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }

            20% {
                opacity: 1;
                transform: scale(1);
            }

            85% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.02);
                visibility: hidden;
            }
        }

        /* --- STAGE 5: ISOLATED EXIT CURTAIN (9.8s - 10.4s) --- */
        .transition-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            animation: dropCurtain 0.6s ease-in-out forwards;
            animation-delay: 9.8s;
        }

        @keyframes dropCurtain {
            to {
                opacity: 1;
            }
        }

        /* Responsive Mobile Scaling */
        @media (max-width: 768px) {
            h2 {
                font-size: 1.4rem;
                padding: 0 15px;
            }

            .logo {
                width: 110px;
                height: 110px;
            }

            .loading-text {
                font-size: 1rem;
            }

            .project-title-container h1 {
                font-size: 2.6rem;
            }

            .project-title-container h3 {
                font-size: 0.9rem;
                padding: 0 10px;
            }
        }
    </style>

    <script>
        setTimeout(() => {
            window.location.href = "sample.html";
        }, 10400);
    </script>
</body>

</html>
