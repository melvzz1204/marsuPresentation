<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - Marinduque State University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>
<style>
  .mm {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>

<body>
  <div id="app">
    <div class="login-card" id="loginCard">
      <div id="loginView">
        <div class="mm">
          <div class="accent-wrapper">
            <div>
              <img src="./src/assets/marsuLogo.png" alt="MarSU Logo" class="brand-logo">
            </div>
            <img src="./src/assets/empp.png" alt="MarSU Empower Badge" class="brand-sub-accent"
              style="width: 180px; height: 30px; object-fit: cover;">
          </div>
        </div>
        <p class="brand-title" style="margin-top: 30px; margin-bottom: 40px;">Marinduque State University</p>
        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn-login" style="background-color: #660033; color: white;">Sign In</button>
        </form>
      </div>

      <div id="successView" class="hidden">
        <div class="brand-header">
          <img src="/src/assets/marsuLogo.png" alt="MarSU Logo" class="brand-logo brand-logo-success">
          <h1 class="success-title">Welcome Back</h1>
          <p>Access Granted to <strong id="displayUsername"></strong></p>
          <p class="success-subtitle">MarSU Presentation Demo Dashboard Ready.</p>
        </div>
      </div>

      <div id="feedbackMessage" class="message"></div>
      <p style="font-size: 12px;"><i>Empowering Minds, Transforming Lives, and Advancing Opportunities with a Heart</i>
      </p>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
