<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
</head>

<style>
    /* --- STRUCTURAL RESET & COHESIVE FLEXBOX --- */
    .container {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        text-align: center !important;

        /* Fixed Positioning spanning the full width of the view deck */
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        padding-top: 25px !important;
        z-index: 9998 !important;
        pointer-events: none;
        /* Allows underlying content elements to remain clickable */
    }

    .container div,
    .container p {
        pointer-events: auto;
        /* Restores standard clicking functionality to inner header elements */
    }

    /* --- LOGO EMBLEM Footprint --- */
    .container img {
        width: 65px !important;
        height: auto !important;
        margin-bottom: 8px !important;
        filter: drop-shadow(0px 3px 6px rgba(0, 0, 0, 0.4)) !important;
    }

    /* --- THEMED TYPOGRAPHY CORRECTIONS --- */
    .container p {
        margin: 0 !important;
        font-family: 'Montserrat', sans-serif !important;
        color: rgba(250, 250, 250, 0.75) !important;
        font-size: 10px !important;
        /* Matches presentation microscale specifications */
        font-weight: 500 !important;
        text-transform: uppercase !important;
        letter-spacing: 1.8px !important;
        line-height: 1.5 !important;
    }

    /* Highlights institutional name with the core presentation gold branding */
    .container p strong,
    .brand-accent {
        color: #D4AF37 !important;
        font-weight: 700 !important;
        letter-spacing: 2px !important;
    }
</style>

<body>
    <div class="container">
        <div>
            <img src="../assets/marsuLogo.png" alt="Marinduque State University Emblem">
        </div>
        <p>
            Republic of the Philippines<br>
            <span class="brand-accent">Marinduque State University</span><br>
            Office of the President
        </p>
    </div>
</body>

</html>
