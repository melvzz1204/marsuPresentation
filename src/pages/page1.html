<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The President's Report</title>
    <!-- Premium Fonts for a Presidential/Executive tone -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
</head>
<style>
    :root {
        --burgundy-deep: #4A0E17;
        --burgundy-dark: #2A080C;
        --gold-primary: #D4AF37;
        --gold-light: #F3E5AB;
        --text-white: #FAFAFA;
    }

    body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
        /* Rich, deep burgundy radial vignette that pulls focus to the center */
        background: radial-gradient(circle, var(--burgundy-deep) 0%, var(--burgundy-dark) 100%);
        color: var(--text-white);
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    .content {
        position: absolute;
        transform: translate(-50%, -50%);
        top: 50%;
        left: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 90%;
        max-width: 1000px;
    }

    h1 {
        font-family: 'Cinzel', serif;
        font-size: 4.5rem;
        font-weight: 800;
        color: var(--gold-primary);
        letter-spacing: 3px;
        margin: 0;
        text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.6);
        line-height: 1.2;
    }

    /* Elegant procedural accent line under the main title */
    .divider {
        width: 180px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        margin: 25px 0;
    }

    span {
        font-size: 1.2rem;
        font-weight: 300;
        color: var(--gold-light);
        text-transform: uppercase;
        letter-spacing: 4px;
        opacity: 0.9;
        line-height: 1.5;
    }

    /* Subtle decorative corner borders to give it a certificate/official frame look */
    body::before,
    body::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border: 1px solid rgba(212, 175, 55, 0.15);
        pointer-events: none;
    }

    body::before {
        top: 30px;
        left: 30px;
        border-right: 0;
        border-bottom: 0;
    }

    body::after {
        bottom: 30px;
        right: 30px;
        border-left: 0;
        border-top: 0;
    }

    /* Responsive scaling for presentation viewports */
    @media (max-width: 768px) {
        h1 {
            font-size: 2.8rem;
        }

        span {
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .divider {
            width: 120px;
            margin: 20px 0;
        }
    }
</style>

<body>
    <div id="nav-placeholder"></div>
    <div id="header-placeholder"></div>

    <div class="content">
        <h1>The President’s Report</h1>
        <div class="divider"></div>
        <span>For the interim period ended June 30, 2026</span>
    </div>

    <div id="footer-placeholder"></div>
    <script src="comp.js"></script>
</body>

</html>
