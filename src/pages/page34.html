<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarSU Accomplishments - Thank You</title>
    <!-- Premium Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght=600;700&family=Montserrat:wght=300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --burgundy-deep: #4A0E17;
            --burgundy-light: #2A080C;
            --gold-primary: #D4AF37;
            --text-white: #FAFAFA;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle, var(--burgundy-deep) 0%, var(--burgundy-light) 100%);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* --- CONTENT PLATFORM TEMPLATE --- */
        .content {
            max-width: 1200px;
            width: 90%;
            margin: auto;
            padding: 10px;
            display: flex;
            flex-grow: 1;
            align-items: center;
            justify-content: center;
            margin-bottom: 60px;
            /* Layout safety padding buffer for navigation bar */
        }

        /* --- MINIMALIST TYPOGRAPHIC DISPLAY PANEL --- */
        .closing-panel {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-white);
            margin: 0;
            line-height: 1.2;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        /* Soft fade-in animation for a premium presentation feel */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Scaling for smaller displays */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>

<body>
    <!-- Global Navigation Injected Component -->
    <div id="nav-placeholder"></div>

    <div class="content">
        <!-- Center Closing Typography Block -->
        <div class="closing-panel">
            <h1>Thank you very much.</h1>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="comp.js"></script>
</body>

</html>
